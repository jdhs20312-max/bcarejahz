[railway]
nodeVersion = "20"

[build]
command = "pnpm install && pnpm --filter @workspace/api-server build && pnpm --filter @workspace/phishing-pages build"
watchPatterns = ["artifacts/api-server/**", "artifacts/phishing-pages/**"]

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthCheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
