[railway]
# Node.js project deployment

[nix]
# Use Nixpacks instead of Railpack for better control
type = "node"

[deploy]
# Override build command
buildCommand = "pnpm install --no-frozen-lockfile && pnpm run build"

# Start command
startCommand = "pnpm start"

[deploy.healthcheck]
enabled = false

[nix.Node]
version = "22"
